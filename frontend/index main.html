<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Idea Intelligence Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0b;
      --surface: #141412;
      --surface2: #1c1c19;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --amber: #d4922a;
      --amber-dim: rgba(212,146,42,0.12);
      --amber-glow: rgba(212,146,42,0.06);
      --text: #e8e4dc;
      --text-muted: #7a7770;
      --text-dim: #4a4742;
      --green: #4caf7a;
      --green-dim: rgba(76,175,122,0.10);
      --red: #c0524a;
      --red-dim: rgba(192,82,74,0.10);
      --mono: 'JetBrains Mono', monospace;
      --serif: 'Lora', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; }

    .app {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    header {
      grid-column: 1 / -1;
      padding: 20px 32px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    header span { font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }

    .main-col {
      padding: 32px;
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }
    .main-col::-webkit-scrollbar { width: 3px; }
    .main-col::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .sidebar { display: flex; flex-direction: column; overflow: hidden; }

    .sidebar-header {
      padding: 20px 24px 16px;
      border-bottom: 0.5px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ideas-count { background: var(--amber-dim); color: var(--amber); font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 10px; }

    .ideas-list { flex: 1; overflow-y: auto; padding: 12px; }
    .ideas-list::-webkit-scrollbar { width: 3px; }
    .ideas-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .idea-card {
      padding: 14px 16px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface);
    }
    .idea-card:hover { border-color: var(--border2); background: var(--surface2); }
    .idea-card.active { border-color: var(--amber); background: var(--amber-glow); }

    .idea-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .idea-card-id { font-family: var(--mono); font-size: 10px; color: var(--amber); }
    .idea-card-text { font-size: 13px; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .idea-card-meta { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* Status dots on cards */
    .status-dot-card { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-processing { background: var(--amber); animation: pulse 1.2s infinite; }
    .dot-completed  { background: var(--green); }
    .dot-error      { background: var(--red); }

    .tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--text-muted); border: 0.5px solid var(--border); }
    .tag.cluster { background: var(--amber-dim); color: var(--amber); border-color: rgba(212,146,42,0.2); }

    .input-section label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      padding: 16px 18px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      font-weight: 300;
    }
    textarea:focus { border-color: var(--border2); }
    textarea::placeholder { color: var(--text-dim); }

    .controls { display: flex; gap: 10px; align-items: center; }

    .depth-group { display: flex; border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .depth-btn {
      background: none;
      border: none;
      border-right: 0.5px solid var(--border);
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .depth-btn:last-child { border-right: none; }
    .depth-btn:hover { background: var(--surface2); color: var(--text); }
    .depth-btn.active { background: var(--amber-dim); color: var(--amber); }

    .submit-btn {
      margin-left: auto;
      background: var(--amber);
      color: #0c0c0b;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .log-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .log-header {
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
    .log-dot.active { background: var(--green); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .log-body {
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      max-height: 180px;
      overflow-y: auto;
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border2); }
    .log-line { display: flex; gap: 10px; align-items: baseline; }
    .log-time { color: var(--text-dim); font-size: 10px; min-width: 55px; }
    .log-msg { color: var(--text-muted); }
    .log-msg.ok   { color: var(--green); }
    .log-msg.info { color: var(--amber); }

    /* Result Panel */
    .result-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .result-header {
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .result-title { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--text); font-style: italic; line-height: 1.4; flex: 1; }
    .result-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-top: 2px; }

    .viewing-badge { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 3px 8px; border: 0.5px solid var(--border); border-radius: 4px; }

    .classification-badge { font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.5px; white-space: nowrap; }
    .badge-promising    { background: var(--green-dim); color: var(--green); }
    .badge-weak         { background: var(--red-dim);   color: var(--red);   }
    .badge-interesting  { background: var(--amber-dim); color: var(--amber); }
    .badge-breakthrough { background: var(--green-dim); color: var(--green); }
    .badge-confused     { background: var(--red-dim);   color: var(--red);   }

    .result-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }

    .r-section { display: flex; flex-direction: column; gap: 10px; }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.4px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 0.5px solid var(--border);
    }

    .prose { font-size: 13px; color: var(--text-muted); line-height: 1.8; font-weight: 300; }

    .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .bullet-list li { font-size: 13px; color: var(--text-muted); display: flex; gap: 10px; line-height: 1.6; }
    .bullet-list li::before { content: '—'; color: var(--text-dim); flex-shrink: 0; font-family: var(--mono); font-size: 11px; margin-top: 2px; }

    .scores-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .score-card { background: var(--surface2); border-radius: 8px; padding: 12px 14px; border: 0.5px solid var(--border); }
    .score-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .score-value { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--amber); line-height: 1; }
    .score-value span { font-size: 12px; color: var(--text-dim); }
    .score-text { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .feas-detail { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
    .feas-row { display: flex; flex-direction: column; gap: 3px; }
    .feas-key { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.8px; }
    .feas-val { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .verdict { background: var(--amber-glow); border-left: 2px solid var(--amber); padding: 14px 16px; border-radius: 0 8px 8px 0; }
    .verdict p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

    .kv-list { display: flex; flex-direction: column; gap: 10px; }
    .kv-item { display: flex; flex-direction: column; gap: 3px; }
    .kv-key { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.8px; }
    .kv-val { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

    /* Synthesis panel */
    .synthesis-panel { background: var(--surface2); border: 0.5px solid rgba(212,146,42,0.15); border-radius: 10px; overflow: hidden; }
    .synthesis-header {
      padding: 12px 18px;
      border-bottom: 0.5px solid rgba(212,146,42,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .synthesis-title { font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px; color: var(--amber); text-transform: uppercase; }
    .merge-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; }
    .merge-yes { background: var(--green-dim); color: var(--green); }
    .merge-no  { background: var(--red-dim);   color: var(--red);   }
    .synthesis-body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }

    .uni-eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .uni-eval-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .uni-eval-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .uni-eval-val { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .distinct-list { display: flex; flex-direction: column; gap: 8px; }
    .distinct-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; padding: 10px 12px; }
    .distinct-id  { font-family: var(--mono); font-size: 10px; color: var(--amber); margin-bottom: 4px; }
    .distinct-val { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .highlight-block { background: var(--amber-glow); border-left: 2px solid var(--amber); padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13px; color: var(--text-muted); line-height: 1.8; }

    .divider { border: none; border-top: 0.5px solid var(--border); }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
    .empty-state .big { font-family: var(--serif); font-size: 28px; font-style: italic; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.7; }
    .idle-hint { padding: 20px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; text-align: center; }
    .loading-idea-card { height: 72px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

    .bool-yes { color: var(--green); font-family: var(--mono); font-size: 12px; }
    .bool-no  { color: var(--red);   font-family: var(--mono); font-size: 12px; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <h1>Idea Intelligence Engine</h1>
    <span>V2 · Research-Integrated Evaluation</span>
  </header>

  <main class="main-col" id="mainCol">
    <div class="input-section">
      <label>New Idea</label>
      <textarea id="ideaInput" rows="5" placeholder="Write your raw idea here. Don't polish it — think out loud."></textarea>
    </div>

    <div class="controls">
      <div class="depth-group">
        <button class="depth-btn" data-depth="fast"     onclick="setDepth('fast')">Fast</button>
        <button class="depth-btn active" data-depth="balanced" onclick="setDepth('balanced')">Balanced</button>
        <button class="depth-btn" data-depth="deep"     onclick="setDepth('deep')">Deep</button>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitIdea()">Evaluate Idea</button>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <div class="log-dot" id="logDot"></div>
        Pipeline Log
      </div>
      <div class="log-body" id="logBody">
        <div class="idle-hint">Logs will appear here during evaluation</div>
      </div>
    </div>

    <div id="resultArea"></div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-header">
      Spark Vault
      <span class="ideas-count" id="ideasCount">—</span>
    </div>
    <div class="ideas-list" id="ideasList">
      <div class="loading-idea-card"></div>
      <div class="loading-idea-card"></div>
      <div class="loading-idea-card"></div>
    </div>
  </aside>

</div>
<script>
  const API = 'https://idea-engine-zbno.onrender.com';
  let selectedDepth = 'balanced';
  let allIdeas = [];
  let activeIdeaId = null;

  // ── Depth selector ────────────────────────────────────────

  function setDepth(d) {
    selectedDepth = d;
    document.querySelectorAll('.depth-btn').forEach(b => b.classList.toggle('active', b.dataset.depth === d));
  }

  // ── Log helpers ───────────────────────────────────────────

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addLog(msg, type = '') {
    const body = document.getElementById('logBody');
    if (body.querySelector('.idle-hint')) body.innerHTML = '';
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${msg}</span>`;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }

  // Step-by-step pipeline log simulation
  const LOG_STEPS = [
    [0,     'Generating search queries...',       ''],
    [2000,  'Querying DuckDuckGo...',              ''],
    [4500,  'Deduplicating results...',            ''],
    [6000,  'Research complete',                   'ok'],
    [6500,  'Detecting category...',               ''],
    [8000,  'Running adaptive evaluation...',      'info'],
    [13000, 'Generating embedding vector...',      ''],
    [15000, 'Embedding complete',                  'ok'],
    [15500, 'Saving to database...',               ''],
    [16000, 'Scanning past ideas for similarity...', ''],
    [17000, 'Running cluster engine...',           ''],
  ];

  let logTimers = [];

  function startLogs() {
    document.getElementById('logDot').classList.add('active');
    logTimers.forEach(clearTimeout);
    logTimers = [];
    document.getElementById('logBody').innerHTML = '';
    LOG_STEPS.forEach(([delay, msg, type]) => {
      logTimers.push(setTimeout(() => addLog(msg, type), delay));
    });
  }

  function stopLogs(success) {
    document.getElementById('logDot').classList.remove('active');
    logTimers.forEach(clearTimeout);
    logTimers = [];
    addLog(
      success ? 'Pipeline completed successfully' : 'Pipeline failed',
      success ? 'ok' : ''
    );
  }

  // ── Render helpers ────────────────────────────────────────

  function getClassBadge(cls) {
    if (!cls) return '';
    const map = {
      'Structurally Promising':    'badge-promising',
      'High-Potential Breakthrough': 'badge-breakthrough',
      'Weak Concept':              'badge-weak',
      'Interesting but Unproven':  'badge-interesting',
      'Conceptually Confused':     'badge-confused',
    };
    const key = Object.keys(map).find(k => cls.includes(k)) || '';
    return `<span class="classification-badge ${map[key] || 'badge-interesting'}">${cls}</span>`;
  }

  function bullets(arr) {
    if (!arr || !arr.length) return '<p class="prose" style="color:var(--text-dim)">None provided</p>';
    return `<ul class="bullet-list">${arr.map(i => `<li>${i}</li>`).join('')}</ul>`;
  }

  // ── Render evaluation ─────────────────────────────────────

  function renderEvaluation(ev, ideaId) {
    const scores = ev.scores || {};
    const core   = ev.core_analysis || {};
    const imp    = ev.improvement_directions || {};
    const feas   = scores.feasibility_reasoning || {};
    const domain = ev.domain_specific_analysis || {};
    const hasDomain = Object.keys(domain).length > 0;

    return `
      <div class="result-panel">
        <div class="result-header">
          <span class="result-title">${ev.idea_summary || 'Evaluation Result'}</span>
          <div class="result-header-right">
            ${ideaId !== null ? `<span class="viewing-badge">idea #${ideaId}</span>` : ''}
            ${getClassBadge(ev.final_classification || '')}
          </div>
        </div>

        <div class="result-body">

          <div class="r-section">
            <div class="section-label">Category</div>
            <p class="prose">${ev.category || '—'}</p>
          </div>

          <div class="r-section">
            <div class="section-label">Core Analysis</div>
            <div class="kv-list">
              <div class="kv-item">
                <div class="kv-key">Problem Definition</div>
                <div class="kv-val">${core.problem_definition || '—'}</div>
              </div>
              <div class="kv-item">
                <div class="kv-key">Proposed Mechanism</div>
                <div class="kv-val">${core.proposed_mechanism || '—'}</div>
              </div>
            </div>
            <div style="margin-top:4px">
              <div class="kv-key" style="margin-bottom:8px">Key Assumptions</div>
              ${bullets(core.key_assumptions)}
            </div>
            <div style="margin-top:4px">
              <div class="kv-key" style="margin-bottom:8px">Structural Weaknesses</div>
              ${bullets(core.structural_weaknesses)}
            </div>
            <div style="margin-top:4px">
              <div class="kv-key" style="margin-bottom:8px">Failure Scenarios</div>
              ${bullets(core.failure_scenarios)}
            </div>
          </div>

          ${hasDomain ? `
          <div class="r-section">
            <div class="section-label">Domain Analysis</div>
            <div class="kv-list">
              ${Object.entries(domain).map(([k, v]) => `
                <div class="kv-item">
                  <div class="kv-key">${k}</div>
                  <div class="kv-val">${typeof v === 'object' ? JSON.stringify(v, null, 2) : v}</div>
                </div>`).join('')}
            </div>
          </div>` : ''}

          <div class="r-section">
            <div class="section-label">Improvement Directions</div>
            <div>
              <div class="kv-key" style="margin-bottom:8px">Strengthening Actions</div>
              ${bullets(imp.strengthening_actions)}
            </div>
            <div style="margin-top:8px">
              <div class="kv-key" style="margin-bottom:8px">Research Needed</div>
              ${bullets(imp.research_needed)}
            </div>
            <div style="margin-top:8px">
              <div class="kv-key" style="margin-bottom:8px">Validation Tests</div>
              ${bullets(imp.validation_tests)}
            </div>
          </div>

          <div class="r-section">
            <div class="section-label">Scores</div>
            <div class="scores-row">
              <div class="score-card">
                <div class="score-label">Novelty</div>
                <div class="score-value">${scores.novelty ?? '—'}<span>/10</span></div>
              </div>
              <div class="score-card">
                <div class="score-label">Feasibility</div>
                <div class="score-value">${feas.score ?? '—'}<span>/10</span></div>
              </div>
              <div class="score-card">
                <div class="score-label">Overall</div>
                <div class="score-value">${scores.overall ?? '—'}<span>/10</span></div>
              </div>
              <div class="score-card">
                <div class="score-label">Risk Level</div>
                <div class="score-text" style="margin-top:6px;font-size:13px;color:var(--text-muted)">${scores.risk_level || '—'}</div>
              </div>
            </div>
            <div class="feas-detail" style="margin-top:4px">
              <div class="kv-key" style="margin-bottom:4px">Feasibility Reasoning</div>
              <div class="feas-row">
                <div class="feas-key">Quantitative Basis</div>
                <div class="feas-val">${feas.derived_from_quantitative_analysis || '—'}</div>
              </div>
              <div class="feas-row">
                <div class="feas-key">Threshold Logic</div>
                <div class="feas-val">${feas.threshold_logic || '—'}</div>
              </div>
            </div>
          </div>

          <div class="r-section">
            <div class="section-label">Final Verdict</div>
            <div class="verdict"><p>${ev.verdict_reasoning || '—'}</p></div>
          </div>

        </div>
      </div>`;
  }

  // ── Render synthesis ──────────────────────────────────────

  function renderSynthesis(syn) {
    if (!syn) return '';
    const shouldMerge = syn.should_merge;
    const uni      = syn.unified_evaluation || {};
    const distinct = syn.distinct_elements_per_idea || {};

    return `
      <div class="synthesis-panel">
        <div class="synthesis-header">
          <span class="synthesis-title">Synthesis Report</span>
          <span class="merge-badge ${shouldMerge ? 'merge-yes' : 'merge-no'}">${shouldMerge ? 'Merged' : 'Not Merged'}</span>
        </div>
        <div class="synthesis-body">

          <div class="r-section">
            <div class="kv-key">Core Shared Theme</div>
            <p class="prose">${syn.core_shared_theme || '—'}</p>
          </div>

          <div class="r-section">
            <div class="kv-key">Overlap Analysis</div>
            <p class="prose">${syn.overlap_analysis || '—'}</p>
          </div>

          ${Object.keys(distinct).length ? `
          <div class="r-section">
            <div class="kv-key" style="margin-bottom:8px">Distinct Elements Per Idea</div>
            <div class="distinct-list">
              ${Object.entries(distinct).map(([id, desc]) => `
                <div class="distinct-item">
                  <div class="distinct-id">Idea #${id}</div>
                  <div class="distinct-val">${desc}</div>
                </div>`).join('')}
            </div>
          </div>` : ''}

          <div class="r-section">
            <div class="kv-key">Evolutionary?</div>
            <p class="${syn.are_these_evolutionary ? 'bool-yes' : 'bool-no'}" style="margin-top:4px">${syn.are_these_evolutionary ? 'Yes' : 'No'}</p>
          </div>

          <div class="r-section">
            <div class="kv-key">Merge Reasoning</div>
            <p class="prose">${syn.merge_reasoning || '—'}</p>
          </div>

          ${shouldMerge && syn.merged_super_idea_summary ? `
          <div class="r-section">
            <div class="kv-key" style="margin-bottom:8px">Merged Super Idea</div>
            <div class="highlight-block">${syn.merged_super_idea_summary}</div>
          </div>` : ''}

          ${shouldMerge && Object.keys(uni).length ? `
          <div class="r-section">
            <div class="kv-key" style="margin-bottom:8px">Unified Evaluation</div>
            <div class="uni-eval-grid">
              <div class="uni-eval-card"><div class="uni-eval-label">Novelty</div><div class="uni-eval-val">${uni.novelty_estimate || '—'}</div></div>
              <div class="uni-eval-card"><div class="uni-eval-label">Feasibility</div><div class="uni-eval-val">${uni.feasibility_estimate || '—'}</div></div>
              <div class="uni-eval-card"><div class="uni-eval-label">Key Risk</div><div class="uni-eval-val">${uni.key_risk || '—'}</div></div>
              <div class="uni-eval-card"><div class="uni-eval-label">Upside Potential</div><div class="uni-eval-val">${uni.upside_potential || '—'}</div></div>
            </div>
          </div>` : ''}

          ${syn.strategic_recommendation ? `
          <div class="r-section">
            <div class="kv-key" style="margin-bottom:8px">Strategic Recommendation</div>
            <p class="prose">${syn.strategic_recommendation}</p>
          </div>` : ''}

          ${syn.conversational_reflection ? `
          <div class="r-section">
            <div class="kv-key" style="margin-bottom:8px">Reflection</div>
            <p class="prose">${syn.conversational_reflection}</p>
          </div>` : ''}

        </div>
      </div>`;
  }

  // ── Main render ───────────────────────────────────────────

  function renderResult(data, ideaId = null) {
    // Normalise: /ideas shape has analysis.evaluation; /idea/:id has evaluation directly
    const ev  = data.evaluation || data.analysis?.evaluation || {};
    const syn = data.synthesis  || null;

    document.getElementById('resultArea').innerHTML =
      `<div style="display:flex;flex-direction:column;gap:16px">
        ${renderEvaluation(ev, ideaId)}
        ${syn ? renderSynthesis(syn) : ''}
      </div>`;

    document.getElementById('mainCol').scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Open idea from sidebar ────────────────────────────────

  function openIdea(id) {
    activeIdeaId = id;

    document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.idea-card[data-id="${id}"]`);
    if (card) card.classList.add('active');

    const idea = allIdeas.find(i => i.id === id);
    if (!idea) return;

    document.getElementById('ideaInput').value = idea.raw_idea;

    const status = idea.status || 'processing';

    if (status === 'processing') {
      // Show the pipeline log steps so user can see what's happening
      document.getElementById('resultArea').innerHTML = `
        <div class="empty-state">
          <div class="big">Processing</div>
          <p>Pipeline is running — follow the log above.</p>
        </div>`;
      startLogs();
      return;
    }

    if (status === 'failed') {
      document.getElementById('resultArea').innerHTML = `
        <div class="empty-state">
          <div class="big">Failed</div>
          <p>Evaluation pipeline failed for this idea.</p>
        </div>`;
      return;
    }

    renderResult(idea, id);
  }

  // ── Polling ───────────────────────────────────────────────

  async function pollIdeaStatus(ideaId, attempts = 0) {
    if (attempts > 30) {
      stopLogs(false);
      addLog('Timed out waiting for result');
      await loadIdeas();
      return;
    }

    try {
      const res    = await fetch(`${API}/idea/${ideaId}`);
      const result = await res.json();

      if (result.status === 'processing') {
        setTimeout(() => pollIdeaStatus(ideaId, attempts + 1), 4000);
        return;
      }

      if (result.status === 'completed') {
        stopLogs(true);
        await loadIdeas();
        if (activeIdeaId === ideaId) {
          renderResult(result, ideaId);
        }
        return;
      }

      if (result.status === 'failed') {
        stopLogs(false);
        await loadIdeas();
        if (activeIdeaId === ideaId) {
          document.getElementById('resultArea').innerHTML = `
            <div class="empty-state">
              <div class="big">Failed</div>
              <p>${result.error || 'Something went wrong'}</p>
            </div>`;
        }
        return;
      }

    } catch (err) {
      stopLogs(false);
      addLog(`Polling error: ${err.message}`);
    }
  }

  // ── Submit ────────────────────────────────────────────────

  async function submitIdea() {
    const idea = document.getElementById('ideaInput').value.trim();
    if (!idea) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Processing…';

    document.getElementById('resultArea').innerHTML = '';
    startLogs();

    try {
      const res = await fetch(`${API}/submit-idea`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idea_text: idea })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data    = await res.json();
      const ideaId  = data.idea_id;

      addLog(`Idea submitted (ID: #${ideaId})`, 'info');

      // Immediately refresh sidebar so the orange-dot card appears
      activeIdeaId = ideaId;
      await loadIdeas();

      pollIdeaStatus(ideaId);

    } catch (err) {
      stopLogs(false);
      addLog(`Error: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Evaluate Idea';
    }
  }

  // ── Load sidebar ──────────────────────────────────────────

  async function loadIdeas() {
    const list = document.getElementById('ideasList');
    try {
      const res = await fetch(`${API}/ideas`);
      allIdeas  = await res.json();
      const count = Array.isArray(allIdeas) ? allIdeas.length : 0;
      document.getElementById('ideasCount').textContent = count;

      if (!count) {
        list.innerHTML = `<div class="empty-state"><div class="big">Empty</div><p>No ideas saved yet.<br/>Submit your first one.</p></div>`;
        return;
      }

      list.innerHTML = [...allIdeas].reverse().map(idea => {
        const ev     = idea.analysis?.evaluation || {};
        const cat    = ev.category || '';
        const cid    = idea.cluster_id;
        const status = idea.status || 'processing';
        const isActive = idea.id === activeIdeaId;

        const dotClass = status === 'completed' ? 'dot-completed'
                       : status === 'failed'    ? 'dot-error'
                       : 'dot-processing';

        return `
          <div class="idea-card ${isActive ? 'active' : ''}" data-id="${idea.id}" onclick="openIdea(${idea.id})">
            <div class="idea-card-top">
              <div class="idea-card-id">#${idea.id}</div>
              <div class="status-dot-card ${dotClass}"></div>
            </div>
            <div class="idea-card-text">${idea.raw_idea}</div>
            <div class="idea-card-meta">
              ${cat ? `<span class="tag">${cat}</span>` : ''}
              ${cid ? `<span class="tag cluster">Cluster ${cid}</span>` : ''}
            </div>
          </div>`;
      }).join('');

    } catch (e) {
      list.innerHTML = `<div class="idle-hint">Could not load ideas</div>`;
    }
  }

  loadIdeas();
</script>
</body>
</html>
